<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhanush's Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

:root{
  --bg:#08080a;
  --surface:rgba(24,24,26,0.46);
  --surface-2:rgba(32,32,35,0.58);
  --primary:#2f5aa8;
  --accent:#22c55e;
  --border:rgba(255,255,255,0.07);
  --text:#F5F5F5;
  --muted:#9a9a9e;
  --danger:#ef4444;
  --blue:#3b82f6;
  --orange:#e2a53a;
  --gray-pill:#6b6b70;
  --purple:#8b5cf6;
}
*{box-sizing:border-box;}
html{overflow-x:hidden;width:100%;}
body{
  margin:0;
  color:var(--text);
  font-family:'Inter',sans-serif;
  padding-bottom:50px;
  overflow-x:hidden;
  width:100%;
  background-color:var(--bg);
  background-image:
    radial-gradient(circle at 12% 8%, rgba(34,197,94,0.08), transparent 42%),
    radial-gradient(circle at 88% 15%, rgba(59,130,246,0.07), transparent 45%),
    radial-gradient(circle at 50% 100%, rgba(139,92,246,0.06), transparent 50%),
    linear-gradient(165deg, #0b0d10 0%, #08080a 45%, #0a0b0e 100%);
  background-attachment:fixed;
  background-size:cover;
}
@media(max-width:600px){
  html{font-size:14px;}
  .dashboard{padding:1rem 0.6rem 0 !important;}
}
@media(max-width:420px){
  html{font-size:12.5px;}
}
#bgLayer{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 1100px 620px at 80% -4%, rgba(255,176,110,0.24), transparent 62%),
    radial-gradient(ellipse 800px 460px at 96% 4%, rgba(255,140,90,0.17), transparent 68%),
    radial-gradient(ellipse 600px 500px at 55% -8%, rgba(255,150,100,0.08), transparent 70%),
    linear-gradient(180deg, #101012 0%, #08080a 40%, #050506 100%);
}
.dashboard{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:2rem 1.6rem 0;}

.dash-header{display:flex;align-items:center;gap:0.65rem;margin-bottom:1.7rem;}
.header-dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px rgba(34,197,94,0.65);}
.dash-header h1{font-weight:700;font-size:2rem;margin:0;letter-spacing:-0.01em;}
.dash-header h1[contenteditable="true"]{cursor:text;border-radius:7px;padding:0.05rem 0.4rem;margin:-0.05rem -0.4rem;}
.dash-header h1[contenteditable="true"]:hover{background:rgba(255,255,255,0.05);}
.dash-header h1[contenteditable="true"]:focus{outline:none;background:rgba(255,255,255,0.09);box-shadow:0 0 0 1px rgba(255,255,255,0.18);}
.save-status{margin-left:auto;font-size:0.75rem;color:var(--muted);opacity:0;transition:opacity .25s;user-select:none;}
.save-status.show{opacity:1;}
.save-status.err{color:var(--danger);}

.dash-grid{display:flex;flex-direction:column;gap:1.3rem;}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.15rem 1.2rem;margin-bottom:1.3rem;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);box-shadow:0 12px 36px rgba(0,0,0,0.35);position:relative;z-index:1;}
.panel.menu-open{z-index:60;}
.panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.9rem;position:relative;}
.panel-title{font-weight:700;font-size:1rem;}
.panel-total{color:var(--muted);font-size:0.75rem;font-weight:600;white-space:nowrap;}
.icon-btn{width:26px;height:26px;border-radius:7px;border:none;background:rgba(255,255,255,0.06);color:var(--text);font-size:0.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;}
.icon-btn:hover{background:rgba(255,255,255,0.12);}
.shop-total-pill{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:9px;padding:0.32rem 0.7rem;white-space:nowrap;}
.shop-total-pill-label{font-size:0.68rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}
.shop-total-pill-values{font-size:0.82rem;color:#4ade80;font-weight:700;}

/* ===== TASKS ===== */
.task-block{margin-bottom:0.25rem;}
.task-row{display:flex;align-items:center;gap:0.55rem;padding:0.42rem 0.1rem;position:relative;}
.task-row:hover .grip{opacity:0.7;}
.shop-item:hover .grip{opacity:0.7;}
.shop-cat-head:hover .grip{opacity:0.7;}
.shop-cat-head.drag-over{outline:2px dashed var(--muted);outline-offset:2px;border-radius:6px;}
.shop-item.drag-over{outline:2px dashed var(--muted);outline-offset:2px;border-radius:6px;}
.shop-items.drag-over{outline:2px dashed var(--muted);outline-offset:-2px;border-radius:6px;}
.task-row:hover .more-dots{opacity:1;}
.grip{opacity:0;color:var(--muted);font-size:0.7rem;letter-spacing:1px;cursor:grab;flex:none;user-select:none;font-family:monospace;line-height:1;}
.arrow-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:0.65rem;flex:none;width:14px;display:flex;align-items:center;justify-content:center;transition:transform .15s;padding:0;}
.arrow-btn.collapsed{transform:rotate(-90deg);}
.arrow-spacer{width:14px;flex:none;}
.check{width:17px;height:17px;flex:none;border:2px solid #4a5568;border-radius:5px;cursor:pointer;background:transparent;position:relative;}
.check.checked{background:var(--accent);border-color:var(--accent);}
.check.checked::after{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:#08130d;font-weight:900;}
.bullet-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex:none;margin:0 6px;}
.num-label{color:var(--muted);font-size:0.86rem;flex:none;min-width:15px;text-align:right;}
.task-label{font-size:0.9rem;flex:1;min-width:0;}
.task-label.section{font-weight:700;font-size:0.94rem;}
.task-label.done{text-decoration:line-through;color:var(--muted);}
.link-icon{color:var(--muted);font-size:0.85rem;flex:none;}
.task-link{color:#6ba3ff;font-weight:600;font-size:0.9rem;}
.pill-wrap{display:flex;align-items:center;gap:0.3rem;flex:none;}
.pill-paid{background:rgba(34,197,94,0.16);color:#4ade80;font-size:0.68rem;font-weight:700;padding:0.22rem 0.55rem;border-radius:6px;}
.pill-caret{color:var(--muted);font-size:0.6rem;}
.amount{font-size:0.84rem;color:var(--text);font-weight:600;flex:none;min-width:48px;text-align:right;}
.more-dots{opacity:0;color:var(--muted);font-size:0.85rem;cursor:pointer;flex:none;margin-left:auto;padding:0 0.2rem;}
.nested{margin-left:1.55rem;}
.divider-line{height:1px;background:var(--border);margin:0.6rem 0;}
.add-plus-wrap{position:relative;margin-top:0.4rem;}
.add-plus-btn{width:28px;height:28px;border-radius:7px;border:1px dashed var(--border);background:none;color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;}
.add-plus-btn:hover{color:var(--text);border-color:var(--muted);}
.block-menu{display:none;position:absolute;bottom:34px;left:0;background:#1b1b1e;border:1px solid var(--border);border-radius:10px;box-shadow:0 14px 40px rgba(0,0,0,0.55);padding:0.4rem;width:180px;z-index:50;}
.block-menu.open{display:block;}
.block-menu-item{display:flex;align-items:center;gap:0.6rem;padding:0.4rem 0.55rem;border-radius:6px;cursor:pointer;font-size:0.84rem;color:var(--text);}
.block-menu-item:hover{background:rgba(255,255,255,0.07);}
.block-menu-item .bmi-icon{width:16px;flex:none;color:var(--muted);font-size:0.8rem;text-align:center;}
.block-menu-item .bmi-arrow{margin-left:auto;color:var(--muted);font-size:0.7rem;}
.swatch-row{display:flex;gap:0.4rem;padding:0.3rem 0.55rem 0.2rem;}
.swatch{width:16px;height:16px;border-radius:50%;cursor:pointer;border:1px solid rgba(255,255,255,0.2);}
.menu-sep{height:1px;background:var(--border);margin:0.25rem 0.2rem;}

/* ===== ACCOMMODATION TABLE ===== */
.acc-table{width:100%;border-collapse:collapse;font-size:0.85rem;}
.acc-table th{text-align:left;color:var(--muted);font-weight:500;font-size:0.7rem;padding:0 0.4rem 0.55rem;}
.acc-table td{padding:0.55rem 0.4rem;border-top:1px solid var(--border);vertical-align:middle;}
.acc-name{font-weight:600;}
.acc-url{display:block;color:#6ba3ff;font-size:0.78rem;margin-top:0.1rem;}
.acc-num{text-align:left;}
.status-pill{display:inline-flex;align-items:center;gap:0.3rem;font-size:0.72rem;font-weight:600;padding:0.28rem 0.6rem;border-radius:7px;cursor:pointer;white-space:nowrap;}
.status-shortlisted{background:rgba(59,130,246,0.18);color:#7fb1ff;}
.status-review{background:rgba(226,165,58,0.18);color:#f0b94d;}
.status-not{background:rgba(255,255,255,0.08);color:var(--muted);}
.status-working{background:rgba(34,197,94,0.18);color:var(--accent);}
.status-applied{background:rgba(59,130,246,0.18);color:#7fb1ff;}
.status-interviewing{background:rgba(226,165,58,0.18);color:#f0b94d;}
.status-rejected{background:rgba(239,68,68,0.18);color:#ff8b8b;}

.app-table{width:100%;border-collapse:collapse;font-size:0.85rem;white-space:nowrap;}
.app-table th{text-align:left;color:var(--muted);font-weight:500;font-size:0.7rem;padding:0 0.5rem 0.55rem;}
.app-table td{padding:0.55rem 0.5rem;border-top:1px solid var(--border);vertical-align:middle;}
.app-company{font-weight:600;}
.app-cell{border-radius:7px;}
.app-cell[contenteditable]{border:1px solid transparent;padding:0.3rem 0.5rem;margin:-0.05rem -0.5rem;}
.app-cell[contenteditable]:hover{border-color:var(--border);}
.app-cell[contenteditable]:focus{border-color:rgba(255,255,255,0.18);}
.acc-name[contenteditable],
.acc-num[contenteditable]{border:1px solid transparent;border-radius:7px;padding:0.3rem 0.5rem;margin:-0.05rem -0.5rem;}
.acc-name[contenteditable]:hover,
.acc-num[contenteditable]:hover{border-color:var(--border);}
.acc-name[contenteditable]:focus,
.acc-num[contenteditable]:focus{border-color:rgba(255,255,255,0.18);}
@media(max-width:700px){.app-table{font-size:0.78rem;}}

/* ===== CALENDAR ===== */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.cal-nav button{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,.05);color:var(--text);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:1.2rem;line-height:1;}
.cal-nav button:hover{background:rgba(255,255,255,0.12);}
.cal-month{font-weight:700;font-size:1rem;background:rgba(255,255,255,0.05);padding:0.35rem 1rem;border-radius:20px;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.cal-dow{text-align:center;font-size:0.72rem;color:var(--muted);padding-bottom:0.3rem;font-weight:600;}
.cal-day{aspect-ratio:1;border-radius:9px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,.055);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.82rem;position:relative;color:var(--text);}
.cal-day.outside{color:#4a4a4d;background:transparent;}
.cal-day.today-marker{border:1px solid rgba(255,255,255,0.25);}
.cal-day.selected{background:linear-gradient(135deg,#315ac8,#263f8e);border-color:#426ee0;color:#fff;font-weight:700;box-shadow:0 8px 20px rgba(47,90,168,.35);}
.cal-day .evt-dot{width:4px;height:4px;border-radius:50%;background:#7fb1ff;position:absolute;bottom:5px;}
.cal-day.selected .evt-dot{background:#fff;}

/* ===== SHOPPING ===== */
.shop-cat{margin-bottom:0.15rem;}
.shop-cat-head{display:flex;align-items:center;gap:0.5rem;padding:0.5rem 0;cursor:pointer;}
.shop-cat-title{font-weight:700;font-size:0.9rem;flex:1;}
.shop-cat-total{font-size:0.85rem;color:var(--text);font-weight:600;}
.shop-items{margin-left:1.5rem;}
.shop-item{display:flex;align-items:center;gap:0.6rem;padding:0.38rem 0;}
.shop-item-name{flex:1;font-size:0.87rem;}
.shop-item-name.done{text-decoration:line-through;color:var(--muted);}
.shop-item-price{font-size:0.83rem;color:var(--muted);min-width:44px;}
.shop-divider{height:1px;background:var(--border);margin:0.3rem 0;}
.panel-grip{cursor:grab;color:var(--muted);margin-right:0.5rem;user-select:none;font-size:0.95rem;line-height:1;flex:none;}
.panel-grip:active{cursor:grabbing;}
.panel.drag-over{outline:2px dashed var(--muted);outline-offset:2px;}

/* ===== TRAVEL ===== */
.trip-head{display:flex;align-items:center;gap:0.5rem;cursor:pointer;padding:0.3rem 0;}
.trip-section{border:1px solid var(--border);border-radius:10px;padding:.65rem .75rem;background:rgba(0,0,0,.12);}
.trip-title{font-weight:700;font-size:0.95rem;flex:1;}
.trip-total{color:#4ade80;font-weight:700;font-size:0.9rem;}
.upload-btn{background:rgba(255,255,255,0.08);border:none;color:var(--text);border-radius:7px;padding:0.4rem 0.9rem;font-size:0.8rem;cursor:pointer;}
.trip-summary-line-row{display:flex;align-items:center;gap:0.4rem;margin-bottom:0.4rem;}
.trip-summary-line-row .trip-summary-line{margin-bottom:0;flex:1;min-width:0;}
.trip-link-open{color:#6ba3ff;text-decoration:none;font-size:0.85rem;flex:none;padding:0.1rem 0.2rem;}
.trip-link-open:hover{text-decoration:underline;}
.day-block{border-top:1px solid var(--border);padding-top:0.55rem;margin-top:0.55rem;}
.day-head{display:flex;align-items:center;gap:0.55rem;cursor:pointer;background:rgba(255,255,255,.035);border-radius:7px;padding:.45rem .5rem;}
.day-plus{width:19px;height:19px;border-radius:5px;background:var(--primary);color:#fff;font-size:0.75rem;display:flex;align-items:center;justify-content:center;flex:none;}
.day-title{font-weight:600;font-size:0.87rem;flex:1;}
.day-total{font-size:0.85rem;font-weight:600;}
.day-table-wrap{margin-top:0.7rem;overflow-x:auto;}
.day-table{width:100%;border-collapse:collapse;font-size:0.78rem;white-space:nowrap;}
.day-table th{text-align:left;color:var(--muted);font-weight:500;font-size:0.68rem;padding:0.3rem 0.5rem;}
.day-table td{padding:0.4rem 0.5rem;color:var(--text);}
.day-table td.note-cell{color:var(--muted);white-space:normal;font-size:0.76rem;}
.day-head input[type="date"]{background:transparent;border:0;color:var(--muted);font-size:0.72rem;max-width:104px;padding:0.1rem 0;}
@media(max-width:560px){.day-head{flex-wrap:wrap}.day-total{width:100%;padding-left:27px}.day-head input[type="date"]{margin-left:27px}.money-pair{font-size:.7rem}.shop-item{flex-wrap:wrap}.shop-item-name{min-width:50%;}}

.reset-row{text-align:center;margin-top:1.5rem;display:flex;justify-content:center;gap:1.4rem;}
.reset-link{color:var(--danger);font-size:0.78rem;cursor:pointer;display:inline-flex;align-items:center;gap:0.4rem;text-decoration:none;}

.reset-link:hover{text-decoration:underline;}

/* ===== EDITABLE FIELDS ===== */
[contenteditable="true"]{cursor:text;border-radius:5px;padding:0.05rem 0.25rem;margin:-0.05rem -0.25rem;transition:background .12s;}
[contenteditable="true"]:hover{background:rgba(255,255,255,0.055);}
[contenteditable="true"]:focus{outline:none;background:rgba(255,255,255,0.09);box-shadow:0 0 0 1px rgba(255,255,255,0.18);}
.amount-dual{font-size:0.84rem;color:var(--text);font-weight:600;flex:none;white-space:nowrap;}
.shop-item-price.amount-dual, .shop-cat-total.amount-dual{min-width:auto;}
.money-pair{display:inline-flex;align-items:center;white-space:nowrap;color:var(--muted);font-size:.78rem;padding:.25rem .4rem;border-radius:6px;cursor:text;}
.money-pair:hover{background:rgba(255,255,255,.05);}
.money-pair:focus{outline:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);}
.bills-toggle{min-width:36px;justify-content:center;background:rgba(34,197,94,.15);color:#4ade80;}
.bills-toggle.no{background:rgba(239,68,68,.14);color:#f87171;}
.row-delete{border:0;background:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0 .2rem;}
.row-delete:hover{color:var(--danger);}
.trip-add{margin-left:auto;}
.calendar-events{margin-top:0;padding-top:0;}

/* ===== CALENDAR 3-BOX LAYOUT ===== */
.cal-boxes{display:grid;grid-template-columns:1.15fr 1fr 0.85fr;gap:1rem;align-items:start;}
@media(max-width:860px){.cal-boxes{grid-template-columns:1fr;}}
.cal-box{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:0.9rem;}
.cal-box-title{font-size:0.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:0.6rem;}
.cal-box-progress{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.donut-wrap{display:flex;flex-direction:column;align-items:center;gap:0.5rem;}
.donut-caption{font-size:0.8rem;color:var(--muted);font-weight:600;}
.events-title{font-size:.78rem;font-weight:700;margin-bottom:.5rem;}
.event-line{display:flex;gap:.45rem;align-items:center;padding:.25rem 0;font-size:.8rem;}
.event-line span{flex:1;}
.event-delete{border:0;background:none;color:var(--muted);cursor:pointer;}
.event-add{display:flex;gap:.45rem;margin-top:.55rem;}
.event-add input{flex:1;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text);padding:.4rem .55rem;}
.acc-delete{border:0;background:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:.25rem;}.acc-delete:hover{color:var(--danger);}

/* ===== EMPTY-FIELD PLACEHOLDER HINTS ===== */
.task-label:empty:before,
.task-link:empty:before,
.shop-item-name:empty:before,
.shop-cat-title:empty:before,
.acc-name:empty:before,
.trip-title:empty:before,
.trip-summary-title:empty:before,
.itin-day-title:empty:before,
.day-title:empty:before,
.app-cell:empty:before,
.acc-num:empty:before{
  content:"Type here…";
  color:var(--muted);
  opacity:.55;
  pointer-events:none;
}
.day-table td[contenteditable]:empty:before{
  content:"—";
  color:var(--muted);
  opacity:.4;
  pointer-events:none;
}

/* ===== ITINERARY (Notion-style timeline) ===== */
.trip-layout{display:grid;grid-template-columns:1fr 1.35fr;gap:1.4rem;align-items:start;margin-top:0.8rem;}
@media(max-width:800px){.trip-layout{grid-template-columns:1fr;}}
.trip-summary-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;}
.trip-summary-title[contenteditable]{font-size:1.2rem;font-weight:700;outline:none;}
.trip-summary-dates{color:var(--muted);font-size:0.85rem;margin:0.25rem 0 1rem;}
.trip-summary-section-label{color:var(--accent);font-weight:700;font-size:0.85rem;margin-bottom:0.5rem;}
.trip-summary-line{font-size:0.85rem;margin-bottom:0.4rem;line-height:1.45;outline:none;}
.trip-summary-line[contenteditable]:empty:before{content:attr(data-ph);color:var(--muted);opacity:0.55;}
.trip-summary-key{color:var(--muted);}
.trip-summary-divider{height:1px;background:var(--border);margin:0.9rem 0;}

.itin-timeline{position:relative;}
.itin-day{position:relative;padding-left:26px;margin-bottom:1.3rem;}
.itin-day:last-child{margin-bottom:0.3rem;}
.itin-dot{position:absolute;left:2px;top:6px;width:9px;height:9px;border-radius:50%;background:var(--accent);}
.itin-day:not(:last-child)::after{content:'';position:absolute;left:6px;top:17px;bottom:-22px;width:1px;background:var(--border);}
.itin-day-head{display:flex;align-items:center;gap:0.55rem;margin-bottom:0.5rem;}
.itin-day-title[contenteditable]{font-weight:700;font-size:0.95rem;outline:none;}
.itin-day-date{color:var(--muted);font-size:0.78rem;}
.itin-day-head input[type="date"]{background:transparent;border:0;color:var(--muted);font-size:0.72rem;max-width:104px;padding:0.1rem 0;}
.itin-heading-row{display:flex;align-items:center;gap:0.4rem;margin:0.6rem 0 0.35rem;}
.itin-heading[contenteditable]{color:var(--muted);font-weight:700;font-size:0.72rem;letter-spacing:0.4px;text-transform:uppercase;outline:none;}
.itin-heading[contenteditable]:empty:before{content:'Section heading…';opacity:0.5;text-transform:none;letter-spacing:0;}
.itin-items{list-style:none;margin:0;padding:0;}
.itin-item{display:flex;align-items:center;gap:0.45rem;padding:0.18rem 0;font-size:0.85rem;}
.itin-item::before{content:'•';color:var(--muted);flex:none;}
.itin-item-text[contenteditable]{flex:1;min-width:0;outline:none;}
.itin-item-text[contenteditable]:empty:before{content:'Add an activity…';color:var(--muted);opacity:0.5;}
.itin-item:hover .price-add,.itin-item:hover .price-remove{opacity:1;}
.itin-item .more-dots{opacity:0;}
.itin-item:hover .more-dots{opacity:0.6;}
.itin-add-section{margin:0.3rem 0 0.7rem;}
.day-dots{opacity:0;flex:none;color:var(--muted);cursor:pointer;font-size:0.9rem;margin-left:auto;}
.itin-day-head:hover .day-dots{opacity:0.6;}

/* ===== ONE-LINE ACCOMMODATION ===== */
.acc-table td{white-space:nowrap;}
.acc-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;}

/* ===== TASK PRICE TOGGLE ===== */
.price-add{opacity:0;flex:none;font-size:0.72rem;color:var(--muted);border:1px dashed var(--border);border-radius:6px;padding:0.15rem 0.5rem;cursor:pointer;white-space:nowrap;}
.task-row:hover .price-add{opacity:1;}
.price-add:hover{color:var(--text);border-color:var(--muted);}
.price-remove{opacity:0;flex:none;color:var(--muted);cursor:pointer;font-size:0.85rem;padding:0 0.15rem;}
.task-row:hover .price-remove{opacity:1;}
.price-remove:hover{color:var(--danger);}

/* ===== DRAG & DROP ===== */
.grip{cursor:grab;}
.grip:active{cursor:grabbing;}
.task-row.drag-over{background:rgba(255,255,255,0.06);box-shadow:inset 0 2px 0 var(--primary);}
.task-row.dragging{opacity:0.4;}

/* ===== CARRIED-FORWARD DAY DATE ===== */
.day-date-readonly{color:var(--muted);font-size:0.72rem;cursor:default;}

/* ===== CONFIRM MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.open{display:flex;}
.modal-box{background:#1b1b1e;border:1px solid var(--border);border-radius:14px;padding:1.3rem 1.3rem 1.1rem;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.modal-msg{font-size:0.92rem;color:var(--text);margin-bottom:1.1rem;line-height:1.4;}
.modal-actions{display:flex;justify-content:flex-end;gap:0.6rem;}
.modal-btn{border:none;border-radius:8px;padding:0.5rem 1rem;font-size:0.84rem;font-weight:600;cursor:pointer;font-family:inherit;}
.modal-btn.cancel{background:rgba(255,255,255,0.08);color:var(--text);}
.modal-btn.cancel:hover{background:rgba(255,255,255,0.14);}
.modal-btn.danger{background:var(--danger);color:#fff;}
.modal-btn.danger:hover{background:#f2555a;}
</style>

<body>
<div id="bgLayer"></div>
<div class="dashboard">

  <div class="dash-grid">

      <!-- TASKS -->

<script>
/* ===================== DATA ===================== */
let tasks = [];

let accommodation = [];

let shopping = [];

let trips = [];

let applications = [];

let profile = { name:'Dhanush' };

const _today = new Date();
const _todayIso = `${_today.getFullYear()}-${String(_today.getMonth()+1).padStart(2,'0')}-${String(_today.getDate()).padStart(2,'0')}`;
let calendar = {
  year:_today.getFullYear(), month:_today.getMonth(),
  today:_todayIso,
  selected:_todayIso,
  events:{},
};

function parseGBP(str){
  const m = String(str).replace(/,/g,'').match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : 0;
}
/* Manual GBP/INR fields are intentionally independent: no conversion is done. */
function money(value){ return typeof value==='object' && value ? value : {gbp:Number(value)||0,inr:0}; }
function moneyFields(value, key){ const m=money(value); return `<span class="money-pair" contenteditable="true" data-moneytext="${key}" title="Edit as: GBP 100 · INR 10000">GBP ${m.gbp} · INR ${m.inr}</span>`; }
function readMoney(text, fallback){ const values=String(text).match(/-?\d+(?:\.\d+)?/g)||[]; return {gbp:Number(values[0])||0,inr:Number(values[1])||0}; }
function moneyTotal(items){ return items.reduce((s,item)=>{ const m=money(item.price); return {gbp:s.gbp+m.gbp,inr:s.inr+m.inr}; },{gbp:0,inr:0}); }
function isHttpUrl(str){ return /^https?:\/\/\S+$/i.test(String(str||'').trim()); }
function linkOpenBtn(url){ return isHttpUrl(url) ? `<a class="trip-link-open" href="${String(url).trim()}" target="_blank" rel="noopener" title="Open link" onclick="event.stopPropagation()">↗</a>` : ''; }

/* ===================== CONFIRM MODAL ===================== */
function showConfirm(message){
  return new Promise(resolve=>{
    const overlay = document.getElementById('confirmOverlay');
    const msgEl = document.getElementById('confirmMsg');
    const okBtn = document.getElementById('confirmOk');
    const cancelBtn = document.getElementById('confirmCancel');
    msgEl.textContent = message;
    overlay.classList.add('open');
    function cleanup(result){
      overlay.classList.remove('open');
      okBtn.removeEventListener('click', onOk);
      cancelBtn.removeEventListener('click', onCancel);
      overlay.removeEventListener('click', onOverlay);
      resolve(result);
    }
    function onOk(){ cleanup(true); }
    function onCancel(){ cleanup(false); }
    function onOverlay(e){ if(e.target===overlay) cleanup(false); }
    okBtn.addEventListener('click', onOk);
    cancelBtn.addEventListener('click', onCancel);
    overlay.addEventListener('click', onOverlay);
  });
}

/* ===================== EDITABLE BINDING ===================== */
function bindEditable(selector, onCommit){
  document.querySelectorAll(selector).forEach(el=>{
    el.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ e.preventDefault(); el.blur(); }
    });
    el.addEventListener('blur', ()=> { onCommit(el); scheduleSave(); });
    el.addEventListener('click', e=> e.stopPropagation());
  });
}

/* ===================== TASKS RENDER ===================== */
function uid(){ return 't'+Math.random().toString(36).slice(2,9); }

function renderTaskNode(node, nested){
  if(node.type==='section'){
    let html = `<div class="task-block ${nested?'nested':''}">
      <div class="task-row" data-dragid="${node.id}">
        <span class="grip" draggable="true">::</span>
        <button class="arrow-btn ${node.collapsed?'collapsed':''}" data-toggle="${node.id}">▾</button>
        <span class="task-label section" style="color:${node.color||'inherit'}" contenteditable="true" data-sectiontitle="${node.id}">${node.title}</span>
        <span class="more-dots" data-deltask="${node.id}" title="Delete">⋯</span>
      </div>
      <div class="section-body" style="${node.collapsed?'display:none;':''}">
        ${node.children.map(c=>renderTaskNode(c, true)).join('')}
      </div>
    </div>`;
    return html;
  }
  if(node.type==='todo'){
    const priceHtml = node.paid
      ? `${moneyFields(node.amount,`task:${node.id}`)}<span class="price-remove" data-pricedel="${node.id}" title="Remove price">×</span>`
      : `<span class="price-add" data-priceadd="${node.id}" title="Add a price for this task">+ price</span>`;
    return `<div class="task-row ${nested?'nested':''}" data-dragid="${node.id}">
      <span class="grip" draggable="true">::</span>
      <span class="arrow-spacer"></span>
      <div class="check ${node.done?'checked':''}" data-check="${node.id}"></div>
      <span class="task-label ${node.done?'done':''}" style="color:${node.color||''}" contenteditable="true" data-tasktext="${node.id}">${node.text}</span>
      ${linkOpenBtn(node.text)}
      ${priceHtml}
      <span class="more-dots" data-delitem="${node.id}" title="Delete task" style="opacity:0.6;margin-left:0;">×</span>
    </div>`;
  }
  if(node.type==='bulletgroup'){
    return `<div class="task-block">
      <div class="task-row" data-dragid="${node.id}">
        <span class="grip" draggable="true">::</span>
        <span class="arrow-spacer" style="width:14px;display:inline-block;"><span style="color:var(--muted);font-size:0.6rem;">●</span></span>
        <span class="task-label section" style="color:${node.color||'inherit'}" contenteditable="true" data-bgtitle="${node.id}">${node.title}</span>
        <span class="more-dots" data-deltask="${node.id}" title="Delete list" style="opacity:0.6;margin-left:0;">×</span>
      </div>
      <div>${node.children.map(c=>`<div class="task-row nested" data-dragid="${c.id}"><span class="grip" draggable="true">::</span><span class="bullet-dot"></span><span class="task-label" contenteditable="true" data-bullettext="${c.id}">${c.text}</span>${linkOpenBtn(c.text)}<span class="more-dots" data-delitem="${c.id}" title="Delete item" style="opacity:0.6;margin-left:0;">×</span></div>`).join('')}
      </div>
    </div>`;
  }
  if(node.type==='divider'){
    return `<div class="task-row" data-dragid="${node.id}" style="padding:0.5rem 0.1rem;">
      <span class="grip" draggable="true">::</span>
      <div class="divider-line" style="flex:1;margin:0;"></div>
    </div>`;
  }
  if(node.type==='numbered'){
    const siblingList = findParentList(tasks, node.id) || tasks;
    const idx = siblingList.filter(t=>t.type==='numbered').indexOf(node)+1;
    return `<div class="task-row" data-dragid="${node.id}">
      <span class="grip" draggable="true">::</span>
      <span class="num-label">${idx}.</span>
      <span class="task-label" style="color:${node.color||'inherit'}" contenteditable="true" data-numtext="${node.id}">${node.text}</span>
      ${linkOpenBtn(node.text)}
      <span class="more-dots" data-delitem="${node.id}" title="Delete" style="opacity:0.6;margin-left:0;">×</span>
    </div>`;
  }
  if(node.type==='link'){
    return `<div class="task-row" data-dragid="${node.id}">
      <span class="grip" draggable="true">::</span>
      <span class="link-icon">🔗</span>
      <span class="task-link" contenteditable="true" data-linktext="${node.id}">${node.text}</span>
      ${linkOpenBtn(node.text)}
      <span class="more-dots" data-delitem="${node.id}" title="Delete" style="opacity:0.6;margin-left:0;">×</span>
    </div>`;
  }
  if(node.type==='heading'){
    return `<div class="task-row" data-dragid="${node.id}"><span class="grip" draggable="true">::</span><span class="task-label section" style="font-size:1rem;color:${node.color||'inherit'}" contenteditable="true" data-headtext="${node.id}">${node.text}</span>${linkOpenBtn(node.text)}<span class="more-dots" data-delitem="${node.id}" title="Delete" style="opacity:0.6;margin-left:0;">×</span></div>`;
  }
  if(node.type==='text'){
    return `<div class="task-row" data-dragid="${node.id}"><span class="grip" draggable="true">::</span><span class="task-label" style="color:${node.color||'inherit'}" contenteditable="true" data-texttext="${node.id}">${node.text}</span>${linkOpenBtn(node.text)}<span class="more-dots" data-delitem="${node.id}" title="Delete" style="opacity:0.6;margin-left:0;">×</span></div>`;
  }
  return '';
}

function tasksTotal(list){
  return (list||[]).reduce((sum,n)=>{
    let t = {gbp:0,inr:0};
    if(n.type==='todo' && n.paid){ const m=money(n.amount); t={gbp:m.gbp,inr:m.inr}; }
    if(n.children){ const c=tasksTotal(n.children); t={gbp:t.gbp+c.gbp, inr:t.inr+c.inr}; }
    return {gbp:sum.gbp+t.gbp, inr:sum.inr+t.inr};
  },{gbp:0,inr:0});
}

function renderTasks(){
  document.getElementById('tasksRoot').innerHTML = tasks.map(n=>renderTaskNode(n,false)).join('');
  const total = tasksTotal(tasks);
  const badge = document.getElementById('tasksTotalBadge');
  if(badge) badge.textContent = (total.gbp || total.inr) ? `Spent: GBP ${total.gbp} · INR ${total.inr}` : '';
  wireTasks();
  renderTaskProgress();
  scheduleSave();
}

function findNode(list, id){
  for(const n of list){
    if(n.id===id) return n;
    if(n.children){ const f = findNode(n.children, id); if(f) return f; }
  }
  return null;
}

function removeNode(list, id){
  const i = list.findIndex(n=>n.id===id);
  if(i>-1){ list.splice(i,1); return true; }
  for(const n of list){
    if(n.children && removeNode(n.children, id)) return true;
  }
  return false;
}

/* find the array (siblings list) that directly contains a node with this id */
function findParentList(list, id){
  if(list.some(n=>n.id===id)) return list;
  for(const n of list){
    if(n.children){ const f = findParentList(n.children, id); if(f) return f; }
  }
  return null;
}
function isDescendant(node, id){
  if(!node.children) return false;
  for(const c of node.children){
    if(c.id===id) return true;
    if(isDescendant(c, id)) return true;
  }
  return false;
}
function moveTaskNode(draggedId, targetId){
  if(!draggedId || draggedId===targetId) return;
  const draggedNode = findNode(tasks, draggedId);
  const sourceList = findParentList(tasks, draggedId);
  if(!draggedNode || !sourceList) return;
  const targetNode = findNode(tasks, targetId);
  if(!targetNode) return;
  if(draggedNode.type==='section' && isDescendant(draggedNode, targetId)) return; // avoid dropping a section into itself

  let destList, destIndex;
  if(targetNode.type==='section'){
    // dropped directly on a toggle section: move inside it, at the end
    destList = targetNode.children;
    destIndex = destList.length;
  } else {
    destList = findParentList(tasks, targetId);
    if(!destList) return;
    destIndex = destList.findIndex(n=>n.id===targetId);
    if(destIndex===-1) return;
  }

  const fromIdx = sourceList.findIndex(n=>n.id===draggedId);
  if(fromIdx===-1) return;
  sourceList.splice(fromIdx,1);
  if(sourceList===destList && fromIdx<destIndex) destIndex--;
  destList.splice(destIndex,0,draggedNode);
  renderTasks();
}

function addSiblingAfter(id, newNode){
  const list = findParentList(tasks, id);
  if(!list) return null;
  const idx = list.findIndex(n=>n.id===id);
  list.splice(idx+1, 0, newNode);
  return newNode;
}

/* Enter key on any block's text: commit current text, add a new sibling
   block of the same kind right after it, and focus the new one. */
function bindEnterAddSibling(dataAttr, makeNode){
  document.querySelectorAll(`[data-${dataAttr}]`).forEach(el=>{
    el.addEventListener('click', e=>e.stopPropagation());
    el.addEventListener('blur', ()=>{
      const node = findNode(tasks, el.dataset[dataAttr]);
      if(node){
        node.text = el.textContent.trim();
        renderTasks();
        return;
      }
      scheduleSave();
    });
    el.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const id = el.dataset[dataAttr];
        const node = findNode(tasks, id);
        if(node) node.text = el.textContent.trim();
        const newNode = makeNode();
        addSiblingAfter(id, newNode);
        renderTasks();
        requestAnimationFrame(()=>{
          const ne = document.querySelector(`[data-${dataAttr}="${newNode.id}"]`);
          if(ne) ne.focus();
        });
      }
    });
  });
}

function wireTasks(){
  document.querySelectorAll('#tasksRoot [contenteditable]').forEach(el=>el.onfocus=()=>{ const key=Object.keys(el.dataset).find(k=>k!=='color'); if(key) window.selectedTaskNodeId=el.dataset[key]; });
  document.querySelectorAll('[data-toggle]').forEach(btn=>{
    btn.onclick = ()=>{
      const node = findNode(tasks, btn.dataset.toggle);
      node.collapsed = !node.collapsed;
      renderTasks();
    };
  });
  document.querySelectorAll('[data-check]').forEach(el=>{
    el.onclick = ()=>{
      const node = findNode(tasks, el.dataset.check);
      node.done = !node.done;
      renderTasks();
    };
  });
  document.querySelectorAll('[data-deltask]').forEach(el=>{
    el.onclick = async (e)=>{
      e.stopPropagation();
      const ok = await showConfirm('Delete this section and everything inside it?');
      if(ok){
        removeNode(tasks, el.dataset.deltask);
        renderTasks();
      }
    };
  });
  document.querySelectorAll('[data-delitem]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      removeNode(tasks, el.dataset.delitem);
      renderTasks();
    };
  });
  document.querySelectorAll('[data-priceadd]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const node = findNode(tasks, el.dataset.priceadd);
      node.paid = true;
      node.amount = {gbp:0, inr:0};
      renderTasks();
    };
  });

  document.querySelectorAll('[data-pricedel]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const node = findNode(tasks, el.dataset.pricedel);
      node.paid = false;
      delete node.amount;
      renderTasks();
    };
  });
  /* ---- drag & drop reordering ---- */
  let draggedTaskId = null;
  document.querySelectorAll('#tasksRoot [data-dragid]').forEach(row=>{
    row.addEventListener('dragover', e=>{ e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', ()=> row.classList.remove('drag-over'));
    row.addEventListener('drop', e=>{
      e.preventDefault();
      row.classList.remove('drag-over');
      if(draggedTaskId) moveTaskNode(draggedTaskId, row.dataset.dragid);
      draggedTaskId = null;
    });
    const grip = row.querySelector(':scope > .grip');
    if(grip){
      grip.addEventListener('dragstart', e=>{
        draggedTaskId = row.dataset.dragid;
        row.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        try{ e.dataTransfer.setData('text/plain', draggedTaskId); }catch(err){}
      });

function computeTaskStats(list){
  let total=0, done=0;
  (list||[]).forEach(n=>{
    if(n.type==='todo'){ total++; if(n.done) done++; }
    if(n.children){ const r=computeTaskStats(n.children); total+=r.total; done+=r.done; }
  });
  return {total, done};
}
function renderTaskProgress(){
  const el = document.getElementById('taskProgressBox');
  if(!el) return;
  const {total, done} = computeTaskStats(tasks);
  const pct = total ? Math.round(done/total*100) : 0;
  const r = 38, c = 2*Math.PI*r;
  const offset = c - (c*pct/100);
  el.innerHTML = `
    <div class="cal-box-title">Tasks Completed</div>
    <div class="donut-wrap">
      <svg width="96" height="96" viewBox="0 0 96 96">
        <circle cx="48" cy="48" r="${r}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10"/>
        <circle cx="48" cy="48" r="${r}" fill="none" stroke="var(--accent)" stroke-width="10" stroke-linecap="round"
          stroke-dasharray="${c}" stroke-dashoffset="${offset}" transform="rotate(-90 48 48)" style="transition:stroke-dashoffset .4s ease;"/>
        <text x="48" y="53" text-anchor="middle" font-size="17" fill="#F5F5F5" font-weight="700">${pct}%</text>
      </svg>
      <div class="donut-caption">${done} of ${total} done</div>
    </div>`;
}

/* ===================== CALENDAR ===================== */
function isoDate(y,m,d){ return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function eventList(iso){ const value=calendar.events[iso]; return Array.isArray(value)?value:(value?['Event']:[]); }
function renderCalendar(){
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const y = calendar.year, m = calendar.month;
  document.getElementById('calMonthLabel').textContent = `${monthNames[m]} ${y}`;
  const startOffset = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();
  let cells = [];
  for(let i=startOffset-1;i>=0;i--) cells.push({d:daysInPrevMonth-i, outside:true});
  for(let d=1; d<=daysInMonth; d++) cells.push({d, outside:false});
  while(cells.length % 7 !== 0 || cells.length < 42) cells.push({d:'',outside:true});
  const dow = ['S','M','T','W','T','F','S'];
  let html = dow.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  html += cells.map(c=>{
    if(c.outside) return `<div class="cal-day outside">${c.d}</div>`;
    const iso = isoDate(y,m,c.d);
    let cls = 'cal-day';
    if(iso===calendar.today) cls += ' today-marker';
    if(iso===calendar.selected) cls += ' selected';
    const dot = eventList(iso).length ? '<span class="evt-dot"></span>' : '';
    return `<div class="${cls}" data-calday="${iso}" title="Select this date to manage its events">${c.d}${dot}</div>`;
  }).join('');
  document.getElementById('calGrid').innerHTML = html;
  document.querySelectorAll('[data-calday]').forEach(el=>{
    el.onclick = ()=>{
      const iso = el.dataset.calday;
      calendar.selected = iso;
      renderCalendar();
    };
  });
  const selectedEvents=eventList(calendar.selected);
  document.getElementById('calendarEvents').innerHTML=`<div class="events-title">Events on ${calendar.selected}</div>${selectedEvents.map((name,i)=>`<div class="event-line"><span>${name}</span><button class="event-delete" data-delevent="${i}" title="Delete event">×</button></div>`).join('')||'<div class="event-line"><span style="color:var(--muted)">No events yet</span></div>'}<div class="event-add"><input id="eventName" placeholder="Add an event for this date"><button class="upload-btn" id="eventAdd">Add</button></div>`;
  document.querySelectorAll('[data-delevent]').forEach(el=>el.onclick=()=>{ const list=eventList(calendar.selected); list.splice(Number(el.dataset.delevent),1); if(list.length) calendar.events[calendar.selected]=list; else delete calendar.events[calendar.selected]; renderCalendar(); });
  document.getElementById('eventAdd').onclick=()=>{ const input=document.getElementById('eventName'); const name=input.value.trim(); if(!name) return; const list=eventList(calendar.selected); list.push(name); calendar.events[calendar.selected]=list; renderCalendar(); };
  renderTaskProgress();
  scheduleSave();
}
document.getElementById('calPrev').onclick = ()=>{
  calendar.month--; if(calendar.month<0){ calendar.month=11; calendar.year--; } renderCalendar();
};
document.getElementById('calNext').onclick = ()=>{
  calendar.month++; if(calendar.month>11){ calendar.month=0; calendar.year++; } renderCalendar();
};

/* ===================== SHOPPING ===================== */
let draggedShopKey = null;
let draggedShopCatId = null;
function moveShopCategory(fromId, toId){
  if(!fromId || !toId || fromId===toId) return;
  const fromIdx = shopping.findIndex(c=>c.id===fromId);
  const toIdx = shopping.findIndex(c=>c.id===toId);
  if(fromIdx===-1 || toIdx===-1) return;
  const [cat] = shopping.splice(fromIdx, 1);
  const newToIdx = shopping.findIndex(c=>c.id===toId);
  shopping.splice(newToIdx, 0, cat);
  renderShopping();
}
function moveShopItem(fromKey, toKey, appendToCatEnd){
  const [fromCat, fromIdxStr] = fromKey.split(':');
  const fromIdx = Number(fromIdxStr);
  const sourceCat = shopping.find(c=>c.id===fromCat);
  if(!sourceCat || !sourceCat.items[fromIdx]) return;
  const item = sourceCat.items[fromIdx];

  let destCat, destIdx;
  if(appendToCatEnd){
    destCat = shopping.find(c=>c.id===toKey);
    if(!destCat) return;
    destIdx = destCat.items.length;
  } else {
    const [toCat, toIdxStr] = toKey.split(':');
    destCat = shopping.find(c=>c.id===toCat);
    if(!destCat) return;
    destIdx = Number(toIdxStr);
    if(fromCat===toCat && fromIdx===destIdx) return;
  }

  sourceCat.items.splice(fromIdx, 1);
  if(sourceCat===destCat && fromIdx < destIdx) destIdx--;
  destCat.items.splice(destIdx, 0, item);
  renderShopping();
}

  document.querySelectorAll('[data-shopcatgrip]').forEach(grip=>{

    });
  });
  document.querySelectorAll('[data-shopcat]').forEach(el=>{
    el.addEventListener('dragover', e=>{ if(draggedShopCatId){ e.preventDefault(); el.classList.add('drag-over'); } });
    el.addEventListener('dragleave', ()=> el.classList.remove('drag-over'));
    el.addEventListener('drop', e=>{
      e.preventDefault();
      e.stopPropagation();
      el.classList.remove('drag-over');
      if(draggedShopCatId) moveShopCategory(draggedShopCatId, el.dataset.shopcat);
      draggedShopCatId = null;
    });
  });
  document.querySelectorAll('[data-shopgrip]').forEach(grip=>{
    grip.addEventListener('dragstart', e=>{
      draggedShopKey = grip.dataset.shopgrip;
      e.dataTransfer.effectAllowed = 'move';
    });
    grip.addEventListener('dragend', ()=>{
      draggedShopKey = null;
      document.querySelectorAll('.shop-item.drag-over, .shop-items.drag-over').forEach(x=>x.classList.remove('drag-over'));
    });
  });
  document.querySelectorAll('[data-shopitemrow]').forEach(row=>{
    row.addEventListener('dragover', e=>{ e.preventDefault(); if(draggedShopKey) row.classList.add('drag-over'); });
    row.addEventListener('dragleave', ()=> row.classList.remove('drag-over'));

  document.querySelectorAll('[data-shopcatdel]').forEach(el=>{

      if(ok){

        renderShopping();
      }
    };
  });
  document.querySelectorAll('[data-shopcat]').forEach(el=>{
    el.onclick = (e)=>{
      if(e.target.closest('[contenteditable]')) return;
      const cat = shopping.find(c=>c.id===el.dataset.shopcat);
      cat.collapsed = !cat.collapsed;
      renderShopping();

  });
  document.querySelectorAll('[data-shopcheck]').forEach(el=>{
    el.onclick = ()=>{
      const [catId, idx] = el.dataset.shopcheck.split(':');
      const cat = shopping.find(c=>c.id===catId);
      cat.items[idx].paid = !cat.items[idx].paid;
      renderShopping();
    };

  document.querySelectorAll('[data-additem]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const cat = shopping.find(c=>c.id===el.dataset.additem);
      cat.items.push({name:'', price:0, paid:false});
      cat.collapsed = false;
      renderShopping();
    };
  });
  document.querySelectorAll('[data-shopdel]').forEach(el=>{
    el.onclick = (e)=>{

/* ===================== TRAVEL ===================== */
function dateInput(date){ const d=new Date(date); return isNaN(d)?'':d.toISOString().slice(0,10); }
function formatDisplayDate(iso){
  const d = new Date(iso+'T00:00:00');
  if(isNaN(d)) return '—';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}
function tripDateRange(trip){
  if(!trip.days || !trip.days.length) return '';
  const first = dateInput(trip.days[0].date);
  const last = dateInput(trip.days[trip.days.length-1].date);
  if(!first) return '';
  if(!last || last===first) return formatDisplayDate(first);
  return `${formatDisplayDate(first)} – ${formatDisplayDate(last)}`;
}
function tripItemsTotal(trip){
  let out = {gbp:0,inr:0};
  (trip.days||[]).forEach(day=>{
    (day.blocks||[]).forEach(block=>{
      (block.items||[]).forEach(item=>{
        if(!item.paid) return;
        const m = money(item.amount);
        out = {gbp:out.gbp+m.gbp, inr:out.inr+m.inr};
      });
    });
  });
  return out;
}
function getTrip(tripId){ return trips.find(t=>t.id===tripId); }
function getDay(tripId, dayId){ const t=getTrip(tripId); return t && t.days.find(d=>d.id===dayId); }
function getItinBlock(tripId, dayId, blockId){ const d=getDay(tripId,dayId); return d && d.blocks.find(b=>b.id===blockId); }
function getItinItem(tripId, dayId, blockId, itemId){ const b=getItinBlock(tripId,dayId,blockId); return b && b.items.find(i=>i.id===itemId); }

        ${(block.items||[]).map(item=>{

            : `<span class="price-add" data-itinpriceadd="${trip.id}:${day.id}:${block.id}:${item.id}" title="Add a cost">+ cost</span>`;
          return `<li class="itin-item">
            <span class="itin-item-text" contenteditable="true" data-itintext="${trip.id}:${day.id}:${block.id}:${item.id}">${item.text||''}</span>

          </li>`;
        }).join('')}

  return blocksHtml + `<button class="add-plus-btn itin-add-section" data-addblock="${trip.id}:${day.id}" style="width:auto;padding:0.22rem 0.6rem;font-size:0.72rem;">+ Add section</button>`;

function renderTravel(){
  document.getElementById('travelRoot').innerHTML = trips.map(trip=>{
    const dayItems = trip.days.map((day, dayIdx)=>{
      const dateField = dayIdx===0
        ? `<input type="date" data-daydate="${trip.id}:${day.id}" value="${dateInput(day.date)}" onclick="event.stopPropagation()">`
        : `<span class="itin-day-date" title="Follows Day 1 automatically">${dateInput(day.date) ? formatDisplayDate(dateInput(day.date)) : '—'}</span>`;
      return `<div class="itin-day">
        <span class="itin-dot"></span>
        <div class="itin-day-head" data-day="${trip.id}:${day.id}">
          <span class="itin-day-title" contenteditable="true" data-daytitle="${trip.id}:${day.id}">${day.title}</span>
          ${dateField}
          <span class="day-dots" data-delday="${trip.id}:${day.id}" title="Delete day">⋯</span>
        </div>
        ${renderDayBlocks(trip, day)}
      </div>`;
    }).join('');

    const url = (trip.flightNumber||'').trim();
    const isLink = isHttpUrl(url);
    const urlField = `<div class="trip-summary-line-row">
      <span class="trip-summary-line" contenteditable="true" data-flightnum="${trip.id}" data-ph="Paste a link…" style="${isLink?'color:#6ba3ff;':''}">${trip.flightNumber||''}</span>
      ${linkOpenBtn(url)}
    </div>`;

    const accList = (trip.accommodation && trip.accommodation.length) ? trip.accommodation : [''];
    const accLines = accList.map((line,idx)=>`
      <div class="trip-summary-line-row">
        <span class="trip-summary-line" contenteditable="true" data-tripaccom="${trip.id}:${idx}" data-ph="Hotel name and address…">${line}</span>
        ${accList.length>1 ? `<span class="more-dots" data-tripaccdel="${trip.id}:${idx}" title="Remove" style="opacity:0.5;">×</span>` : ''}
      </div>`).join('');

    const tripTotal = tripItemsTotal(trip);
    const dateRange = tripDateRange(trip);

    return `<div class="trip-section" style="margin-bottom:0.8rem;">
      <div class="trip-head" data-trip="${trip.id}">
        <button class="arrow-btn ${trip.collapsed?'collapsed':''}">▾</button>
        <span class="trip-title" contenteditable="true" data-triptitle="${trip.id}">${trip.title}</span>
        <span class="trip-total">${(tripTotal.gbp||tripTotal.inr) ? `Total: GBP ${tripTotal.gbp} · INR ${tripTotal.inr}` : ''}</span>
      </div>
      <div style="${trip.collapsed?'display:none;':''}">
        <div class="trip-layout">
          <div class="trip-summary-card">
            <div class="trip-summary-title" contenteditable="true" data-triptitle="${trip.id}">${trip.title||''}</div>
            <div class="trip-summary-dates">${dateRange}</div>
            <div class="trip-summary-section-label">Flight Details</div>
            ${urlField}
            <div class="trip-summary-line" contenteditable="true" data-flightdep="${trip.id}" data-ph="Departure — airport &amp; time…">${trip.flightDeparture||''}</div>
            <div class="trip-summary-line" contenteditable="true" data-flightarr="${trip.id}" data-ph="Arrival — airport &amp; time…">${trip.flightArrival||''}</div>
            <div class="trip-summary-divider"></div>
            <div class="trip-summary-section-label" style="display:flex;align-items:center;justify-content:space-between;">
              <span>Accommodation</span>
              <span class="add-plus-btn" data-tripaddacc="${trip.id}" title="Add another accommodation" style="width:19px;height:19px;font-size:0.8rem;">+</span>
            </div>
            ${accLines}
          </div>
          <div class="itin-timeline">
            ${dayItems}
            <button class="add-plus-btn" data-addday="${trip.id}" style="margin-top:0.4rem;font-size:0.78rem;width:auto;padding:0.3rem 0.7rem;gap:0.3rem;">+ Add day</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  document.querySelectorAll('[data-trip]').forEach(el=>{
    el.onclick = (e)=>{
      if(e.target.closest('[contenteditable]')) return;
      const trip = trips.find(t=>t.id===el.dataset.trip);
      trip.collapsed = !trip.collapsed;
      renderTravel();
    };
  });
  document.querySelectorAll('[data-day]').forEach(el=>{
    el.onclick = (e)=>{
      if(e.target.closest('[contenteditable]')) return;
      if(e.target.closest('[data-delday]')) return;
      const [tripId, dayId] = el.dataset.day.split(':');
      const day = getDay(tripId, dayId);
      day.collapsed = !day.collapsed;
      renderTravel();
    };
  });
  document.querySelectorAll('[data-delday]').forEach(el=>{
    el.onclick = async (e)=>{
      e.stopPropagation();
      const [tripId, dayId] = el.dataset.delday.split(':');
      const trip = trips.find(t=>t.id===tripId);
      const ok = await showConfirm('Delete this day?');
      if(ok){
        trip.days = trip.days.filter(d=>d.id!==dayId);
        renderTravel();
      }
    };
  });
  document.querySelectorAll('[data-addday]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const trip = trips.find(t=>t.id===el.dataset.addday);
      const n = trip.days.length+1;
      const previous=trip.days[trip.days.length-1]; const next=previous&&dateInput(previous.date) ? new Date(dateInput(previous.date)+'T00:00:00') : null; if(next) next.setDate(next.getDate()+1);
      trip.days.push({id:uid(), title:'Day '+n, date:next?next.toISOString().slice(0,10):'', collapsed:false, blocks:[{id:uid(), heading:'', items:[{id:uid(), text:'', paid:false, amount:{gbp:0,inr:0}}]}]});
      renderTravel();
    };
  });
  document.querySelectorAll('[data-addblock]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const [tripId, dayId] = el.dataset.addblock.split(':');
      const day = getDay(tripId, dayId);
      day.blocks.push({id:uid(), heading:'', items:[{id:uid(), text:'', paid:false, amount:{gbp:0,inr:0}}]});
      renderTravel();
    };
  });
  document.querySelectorAll('[data-delblock]').forEach(el=>{
    el.onclick = async (e)=>{
      e.stopPropagation();
      const ok = await showConfirm('Delete this section and its items?');
      if(!ok) return;
      const [tripId, dayId, blockId] = el.dataset.delblock.split(':');
      const day = getDay(tripId, dayId);
      day.blocks = day.blocks.filter(b=>b.id!==blockId);
      renderTravel();
    };
  });
  document.querySelectorAll('[data-delitinitem]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const [tripId, dayId, blockId, itemId] = el.dataset.delitinitem.split(':');
      const block = getItinBlock(tripId, dayId, blockId);
      if(block) block.items = block.items.filter(i=>i.id!==itemId);
      renderTravel();
    };
  });
  document.querySelectorAll('[data-itinpriceadd]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const [tripId, dayId, blockId, itemId] = el.dataset.itinpriceadd.split(':');
      const item = getItinItem(tripId, dayId, blockId, itemId);
      if(item){ item.paid = true; item.amount = item.amount || {gbp:0,inr:0}; renderTravel(); }
    };
  });
  document.querySelectorAll('[data-itinpricedel]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const [tripId, dayId, blockId, itemId] = el.dataset.itinpricedel.split(':');
      const item = getItinItem(tripId, dayId, blockId, itemId);
      if(item){ item.paid = false; renderTravel(); }
    };
  });
  document.querySelectorAll('[data-itintext]').forEach(el=>{
    el.addEventListener('click', e=>e.stopPropagation());
    el.addEventListener('blur', ()=>{
      const [tripId, dayId, blockId, itemId] = el.dataset.itintext.split(':');
      const item = getItinItem(tripId, dayId, blockId, itemId);
      if(item) item.text = el.textContent.trim();
      renderTravel();
    });
    el.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const [tripId, dayId, blockId, itemId] = el.dataset.itintext.split(':');
        const block = getItinBlock(tripId, dayId, blockId);
        const item = getItinItem(tripId, dayId, blockId, itemId);
        if(!block || !item) return;
        item.text = el.textContent.trim();
        const newItem = {id:uid(), text:'', paid:false, amount:{gbp:0,inr:0}};
        const idx = block.items.findIndex(i=>i.id===itemId);
        block.items.splice(idx+1, 0, newItem);
        renderTravel();
        requestAnimationFrame(()=>{
          const ne = document.querySelector(`[data-itintext="${tripId}:${dayId}:${blockId}:${newItem.id}"]`);
          if(ne) ne.focus();
        });
      }
    });
  });
  bindEditable('[data-moneytext^="itin:"]', el=>{
    const parts = el.dataset.moneytext.split(':');
    const [, tripId, dayId, blockId, itemId] = parts;
    const item = getItinItem(tripId, dayId, blockId, itemId);
    if(item) item.amount = readMoney(el.textContent);
    renderTravel();
  });
  bindEditable('[data-itinheading]', el=>{
    const [tripId, dayId, blockId] = el.dataset.itinheading.split(':');
    const block = getItinBlock(tripId, dayId, blockId);
    if(block) block.heading = el.textContent.trim();
  });
  bindEditable('[data-triptitle]', el=>{
    trips.find(t=>t.id===el.dataset.triptitle).title = el.textContent.trim();
    renderTravel();
  });
  bindEditable('[data-daytitle]', el=>{
    const [tripId, dayId] = el.dataset.daytitle.split(':');
    getDay(tripId, dayId).title = el.textContent.trim();
  });
  bindEditable('[data-flightnum]', el=>{
    trips.find(t=>t.id===el.dataset.flightnum).flightNumber = el.textContent.trim();
    renderTravel();
  });
  bindEditable('[data-flightdep]', el=>{
    trips.find(t=>t.id===el.dataset.flightdep).flightDeparture = el.textContent.trim();
  });
  bindEditable('[data-flightarr]', el=>{
    trips.find(t=>t.id===el.dataset.flightarr).flightArrival = el.textContent.trim();
  });
  bindEditable('[data-tripaccom]', el=>{
    const [tripId, idx] = el.dataset.tripaccom.split(':');
    const trip = trips.find(t=>t.id===tripId);
    if(!trip.accommodation) trip.accommodation = [];
    trip.accommodation[idx] = el.textContent.trim();
  });
  document.querySelectorAll('[data-tripaddacc]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const trip = trips.find(t=>t.id===el.dataset.tripaddacc);
      if(!trip.accommodation) trip.accommodation = [];
      trip.accommodation.push('');
      renderTravel();
    };
  });
  document.querySelectorAll('[data-tripaccdel]').forEach(el=>{
    el.onclick = (e)=>{
      e.stopPropagation();
      const [tripId, idx] = el.dataset.tripaccdel.split(':');
      const trip = trips.find(t=>t.id===tripId);
      trip.accommodation.splice(Number(idx),1);
      renderTravel();
    };
  });
  document.querySelectorAll('[data-daydate]').forEach(el=>el.onchange=()=>{
    const [tripId,dayId]=el.dataset.daydate.split(':'); const trip=trips.find(t=>t.id===tripId); const index=trip.days.findIndex(d=>d.id===dayId); if(index<0||!el.value) return; const start=new Date(el.value+'T00:00:00'); trip.days.forEach((day,i)=>{ if(i>=index){ const d=new Date(start); d.setDate(start.getDate()+i-index); day.date=d.toISOString().slice(0,10); }}); renderTravel();
  });
  scheduleSave();
}

/* ===================== ADD BUTTONS ===================== */
document.getElementById('tasksAddTop').onclick = (e)=>{
  e.stopPropagation();
  const menu = document.getElementById('blockMenu');
  menu.classList.toggle('open');
  menu.closest('.panel').classList.toggle('menu-open', menu.classList.contains('open'));
};
document.getElementById('accAddBtn').onclick = ()=>{
  accommodation.push({name:'', rent:'', bills:'N', status:'not'});
  renderAccommodation();
};
document.getElementById('appAddBtn').onclick = ()=>{
  applications.push({company:'', role:'', status:'applied', salaryRange:'', dateApplied:''});
  renderApplications();
};
document.getElementById('shopAddBtn').onclick = ()=>{
  shopping.push({id:uid(), title:'', collapsed:false, items:[]});
  renderShopping();
};
document.getElementById('tripAddBtn').onclick = ()=>{
  trips.push({id:uid(),title:'',collapsed:false,flightNumber:'',flightDeparture:'',flightArrival:'',accommodation:[''],days:[]});
  renderTravel();
};

/* ===================== PROFILE ===================== */
function renderProfile(){
  document.getElementById('profileName').textContent = profile.name || 'Dhanush';
}
(function bindProfile(){
  const el = document.getElementById('profileName');
  el.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); el.blur(); } });
  el.addEventListener('blur', ()=>{ profile.name = el.textContent.trim() || 'Dhanush'; scheduleSave(); });
})();

/* ===================== PERSISTENCE ===================== */
let loaded = false;
let saveTimer = null;
let panelLayout = null; // flat array of panelkeys, in display order
const DEFAULT_PANEL_LAYOUT = ['tasks','shopping','accommodation','calendar','apptracker','travel'];

function savePanelLayout(){
  panelLayout = Array.from(document.querySelectorAll('.dash-grid > [data-panelkey]')).map(el=>el.dataset.panelkey);
}
function applyPanelLayout(layout){
  layout = layout || panelLayout || DEFAULT_PANEL_LAYOUT;
  const stack = document.querySelector('.dash-grid');
  layout.forEach(key=>{
    const el = document.querySelector(`[data-panelkey="${key}"]`);
    if(el) stack.appendChild(el);
  });
}
function wirePanelDrag(){
  let draggedPanel = null;
  document.querySelectorAll('.dash-grid .panel-grip').forEach(grip=>{
    grip.addEventListener('dragstart', e=>{
      draggedPanel = grip.closest('[data-panelkey]');
      e.dataTransfer.effectAllowed = 'move';
    });
    grip.addEventListener('dragend', ()=>{
      draggedPanel = null;
      document.querySelectorAll('[data-panelkey]').forEach(p=>p.classList.remove('drag-over'));
    });
  });
  document.querySelectorAll('.dash-grid > [data-panelkey]').forEach(panel=>{
    panel.addEventListener('dragover', e=>{ e.preventDefault(); if(draggedPanel && draggedPanel!==panel) panel.classList.add('drag-over'); });
    panel.addEventListener('dragleave', ()=> panel.classList.remove('drag-over'));
    panel.addEventListener('drop', e=>{
      e.preventDefault();
      panel.classList.remove('drag-over');
      if(!draggedPanel || draggedPanel===panel) return;
      const rect = panel.getBoundingClientRect();
      const before = (e.clientY - rect.top) < rect.height/2;
      panel.parentElement.insertBefore(draggedPanel, before ? panel : panel.nextSibling);
      draggedPanel = null;
      savePanelLayout();
      scheduleSave();
    });
  });
}

function snapshot(){
  return { version:2, profile, tasks, accommodation, shopping, trips, applications, calendar, panelLayout };
}
function normaliseTasks(list){
  (list||[]).forEach(node=>{ if(node && node.paid) node.amount=money(node.amount); if(node && node.children) normaliseTasks(node.children); });
}
function migrateTripDays(tripList){
  (tripList||[]).forEach(trip=>{
    if(!trip.accommodation){
      trip.accommodation = trip.accommodationText ? [trip.accommodationText] : [''];
    }
    delete trip.accommodationText;
    delete trip.boardingPass;
    (trip.days||[]).forEach(day=>{
      if(!day.blocks){
        const items = (day.rows||[])
          .filter(r=>r.place||r.food||r.stay||r.notes||r.pcost||r.fcost||r.scost)
          .map(r=>{
            const parts = [];
            if(r.place) parts.push(r.place);
            if(r.food) parts.push('Food: '+r.food);
            if(r.stay) parts.push('Stay: '+r.stay);
            if(r.notes) parts.push(r.notes);
            const cost = (Number(r.pcost)||0)+(Number(r.fcost)||0)+(Number(r.scost)||0);
            return { id: uid(), text: parts.join(' — '), paid: cost>0, amount: {gbp:cost, inr:0} };
          });
        day.blocks = [{
          id: uid(),
          heading: '',
          items: items.length ? items : [{id:uid(), text:'', paid:false, amount:{gbp:0,inr:0}}]
        }];
        delete day.rows;
      }
    });
  });
}
function normaliseState(s){
  if(!s || typeof s!=='object') return s;
  if(Array.isArray(s.tasks)) normaliseTasks(s.tasks);
  if(Array.isArray(s.shopping)) s.shopping.forEach(cat=>(cat.items||[]).forEach(item=>item.price=money(item.price)));
  if(Array.isArray(s.trips)) migrateTripDays(s.trips);
  if(s.calendar){ s.calendar.events=s.calendar.events||{}; Object.keys(s.calendar.events).forEach(key=>{ if(s.calendar.events[key]===true) s.calendar.events[key]=['Event']; }); }
  return s;
}
function applyState(s){
  s=normaliseState(s);
  if(!s) return;
  if(s.profile) profile = s.profile;
  if(Array.isArray(s.tasks)) tasks = s.tasks;
  if(Array.isArray(s.accommodation)) accommodation = s.accommodation;
  if(Array.isArray(s.shopping)) shopping = s.shopping;
  if(Array.isArray(s.trips)) trips = s.trips;
  if(Array.isArray(s.applications)) applications = s.applications;
  if(s.calendar) calendar = s.calendar;
  if(s.panelLayout){
    panelLayout = Array.isArray(s.panelLayout)
      ? s.panelLayout
      : [...(s.panelLayout.left||[]), ...(s.panelLayout.right||[]), ...(s.panelLayout.full||[])];
  }
}
function renderAll(){
  renderProfile();
  renderTasks();
  renderAccommodation();
  renderApplications();
  renderCalendar();
  renderShopping();
  renderTravel();
}

const DEFAULTS = JSON.parse(JSON.stringify(snapshot()));

function setStatus(text, isErr){
  const el = document.getElementById('saveStatus');
  el.textContent = text;
  el.classList.toggle('err', !!isErr);
  el.classList.add('show');
  if(!isErr){
    clearTimeout(setStatus._t);
    setStatus._t = setTimeout(()=> el.classList.remove('show'), 1500);
  }
}
const LS_KEY = 'move-tracker-cache';

function scheduleSave(){
  if(!loaded) return;
  clearTimeout(saveTimer);
  setStatus('Saving…');
  saveTimer = setTimeout(doSave, 700);
}
async function doSave(){
  const payload = JSON.stringify(snapshot());
  // Local cache first (instant, offline-safe)
  try{ localStorage.setItem(LS_KEY, payload); }catch(e){}
  // Then sync to the Redis-backed API (source of truth on deploy)
  try{
    const r = await fetch('/api/data', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: payload,
    });
    if(!r.ok) throw new Error('save failed');
    setStatus('Saved');
  }catch(e){
    setStatus('Saved offline');
  }
}
async function load(){
  let applied = false;
  // Prefer the server (Redis) copy so data syncs across devices
  try{
    const r = await fetch('/api/data');
    if(r.ok){
      const j = await r.json();
      const serverState = j && (j.data || j);
      if(serverState && (serverState.tasks || serverState.shopping || serverState.profile)){ applyState(serverState); applied = true; }
    }
  }catch(e){}
  // Fall back to the local cache when the server/DB is unreachable
  if(!applied){
    try{
      const cached = localStorage.getItem(LS_KEY);
      if(cached){ applyState(JSON.parse(cached)); }
    }catch(e){}
  }
  applyPanelLayout();
  renderAll();
  wirePanelDrag();
  loaded = true;
}

/* ===================== RESET ===================== */
document.getElementById('resetLink').onclick = async ()=>{
  const ok = await showConfirm('Reset the dashboard to blank? This will erase everything currently saved.');
  if(!ok) return;
  applyState(JSON.parse(JSON.stringify(DEFAULTS)));
  panelLayout = null;
  applyPanelLayout(DEFAULT_PANEL_LAYOUT);
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  renderAll();
  doSave();
};

/* ===================== RECONNECT SYNC ===================== */
window.addEventListener('online', ()=>{ if(loaded) doSave(); });

/* ===================== INIT ===================== */
load();
</script>
